<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>TBH 仕様メモ / Specs</title>
<style>
  :root{--bg:#14110d;--surface:#1f1b15;--surface2:#262017;--accent:#d8a657;--text:#ece3d2;--muted:#9a8f7a;--border:#3a342a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;line-height:1.7;padding:24px;max-width:860px;margin:0 auto;}
  .back{font-size:13px;color:var(--muted);text-decoration:none;}.back:hover{color:var(--accent);}
  #md h1{font-size:23px;color:var(--accent);margin:6px 0 6px;}
  #md h2{font-size:19px;color:var(--accent);margin:26px 0 8px;border-bottom:1px solid var(--border);padding-bottom:5px;}
  #md h3{font-size:15px;color:var(--text);margin:16px 0 4px;}
  #md p{margin:8px 0;font-size:14px;}
  #md ul{margin:6px 0 10px;padding-left:20px;}
  #md li{margin:4px 0;font-size:14px;color:var(--text);}
  #md strong{color:var(--accent);font-weight:700;}
  #md code{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:12px;color:#e0c890;font-family:ui-monospace,monospace;}
  #md hr{border:none;border-top:1px solid var(--border);margin:22px 0;}
  #md blockquote{border-left:3px solid var(--accent);background:var(--surface);padding:8px 14px;margin:10px 0;color:var(--muted);font-size:13px;border-radius:0 8px 8px 0;}
  #md table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13px;display:block;overflow-x:auto;}
  #md th,#md td{border:1px solid var(--border);padding:6px 9px;text-align:left;white-space:nowrap;}
  #md th{background:var(--surface2);color:var(--accent);font-weight:600;}
  #md tr:nth-child(even) td{background:rgba(255,255,255,.02);}
  .loading{color:var(--muted);padding:30px 0;text-align:center;}
  .toc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;margin:14px 0;font-size:13px;}
  .toc a{color:var(--accent);text-decoration:none;margin-right:14px;white-space:nowrap;}
  .toc a:hover{text-decoration:underline;}
  .chart{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin:12px 0;}
  .chart .ct{font-size:13px;color:var(--muted);margin-bottom:8px;}
  .chrow{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:13px;}
  .chrow .lbl{width:120px;flex:none;color:var(--text);}
  .chrow .track{flex:1;height:16px;background:var(--surface2);border-radius:8px;overflow:hidden;}
  .chrow .fill{height:100%;border-radius:8px;}
  .chrow .pct{width:54px;text-align:right;flex:none;font-variant-numeric:tabular-nums;}
  .memo{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin:18px 0 8px;}
  .memo .mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .memo .mt{font-size:14px;color:var(--accent);font-weight:600;}
  .memo .ms{font-size:12px;color:var(--muted);}
  .memo textarea{width:100%;min-height:120px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:inherit;font-size:14px;line-height:1.6;resize:vertical;}
  .memo textarea:focus{outline:none;border-color:var(--accent);}
  .editbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:14px 0 4px;}
  .btn{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-family:inherit;font-size:13px;cursor:pointer;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.primary{background:var(--accent);color:#1a1208;border-color:var(--accent);font-weight:600;}
  .btn.primary:hover{filter:brightness(1.08);color:#1a1208;}
  .editbar .es{font-size:12px;color:var(--muted);margin-left:auto;}
  .editbar .es.edited{color:var(--accent);}
  #editor{display:none;}
  #editor textarea{width:100%;min-height:460px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-family:ui-monospace,monospace;font-size:13px;line-height:1.65;resize:vertical;}
  #editor textarea:focus{outline:none;border-color:var(--accent);}
  #editor .hint{font-size:12px;color:var(--muted);margin:6px 2px 0;}
</style>
</head>
<body>
<a class="back" href="index.html">← ツール一覧</a>
<div id="toc" class="toc" style="display:none"></div>
<div class="memo">
  <div class="mh"><span class="mt">📝 マイメモ</span><span class="ms" id="memoStatus">この端末に自動保存</span></div>
  <textarea id="memo" placeholder="自由にメモを書けます。入力すると自動保存され、リロードしても消えません。"></textarea>
</div>
<div class="editbar">
  <button class="btn" id="editBtn">✏️ 本文を編集</button>
  <span class="es" id="editStatus"></span>
</div>
<div id="editor">
  <textarea id="editArea" placeholder="本文(Markdown)をここで自由に編集・削除できます。"></textarea>
  <div class="hint">変更はこの端末に保存され、リロードしても残ります。元の配信内容には影響しません。</div>
  <div class="editbar">
    <button class="btn primary" id="saveBtn">保存して反映</button>
    <button class="btn" id="cancelBtn">キャンセル</button>
    <button class="btn" id="resetBtn">元の内容に戻す</button>
  </div>
</div>
<div id="md"><div class="loading">読み込み中…</div></div>
<script>
// minimal markdown renderer (headings/bold/code/hr/list/table/blockquote)
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inline(s){
  return esc(s).replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
}
function render(md){
  const lines=md.replace(/\r/g,'').split('\n');
  let html='',i=0,toc=[];
  while(i<lines.length){
    let ln=lines[i];
    if(/^\s*$/.test(ln)){i++;continue;}
    // table: header row + |---| separator
    if(/^\|.*\|/.test(ln) && i+1<lines.length && /^\|[\s:|-]+\|/.test(lines[i+1])){
      const cells=r=>r.replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      const head=cells(ln); i+=2; let body='';
      while(i<lines.length && /^\|.*\|/.test(lines[i])){body+='<tr>'+cells(lines[i]).map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>';i++;}
      html+='<table><thead><tr>'+head.map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr></thead><tbody>'+body+'</tbody></table>';continue;
    }
    // heading
    let m=ln.match(/^(#{1,3})\s+(.*)/);
    if(m){const lv=m[1].length,txt=m[2];
      if(lv===2){const id='s'+toc.length;toc.push({id,txt});html+='<h2 id="'+id+'">'+inline(txt)+'</h2>';}
      else html+='<h'+lv+'>'+inline(txt)+'</h'+lv+'>';
      i++;continue;}
    if(/^\[chart:(\w+)\]\s*$/.test(ln)){html+='<div class="chart" data-chart="'+ln.match(/^\[chart:(\w+)\]/)[1]+'"></div>';i++;continue;}
    if(/^---+\s*$/.test(ln)){html+='<hr>';i++;continue;}
    if(/^>\s?/.test(ln)){let b='';while(i<lines.length&&/^>\s?/.test(lines[i])){b+=inline(lines[i].replace(/^>\s?/,''))+' ';i++;}html+='<blockquote>'+b+'</blockquote>';continue;}
    if(/^\s*-\s+/.test(ln)){let items='';while(i<lines.length&&/^\s*-\s+/.test(lines[i])){items+='<li>'+inline(lines[i].replace(/^\s*-\s+/,''))+'</li>';i++;}html+='<ul>'+items+'</ul>';continue;}
    // paragraph
    let p='';while(i<lines.length&&!/^\s*$/.test(lines[i])&&!/^[#>|-]/.test(lines[i])){p+=lines[i]+' ';i++;}
    html+='<p>'+inline(p.trim())+'</p>';
  }
  return {html,toc};
}
const GJA={COMMON:'コモン',UNCOMMON:'アンコモン',RARE:'レア',LEGENDARY:'レジェンダリー',IMMORTAL:'イモータル',ARCANA:'アルカナ',BEYOND:'ビヨンド',CELESTIAL:'セレスティアル',DIVINE:'ディバイン',COSMIC:'コズミック'};
const GCOL={COMMON:'#9aa0a6',UNCOMMON:'#5fb35f',RARE:'#4f8fe0',LEGENDARY:'#c98b2e',IMMORTAL:'#d05b5b',ARCANA:'#a05fd0',BEYOND:'#d84f9a',CELESTIAL:'#3fb6c0',DIVINE:'#e0c850',COSMIC:'#6f7fe0'};
const ORDER=['COMMON','UNCOMMON','RARE','LEGENDARY','IMMORTAL','ARCANA','BEYOND','CELESTIAL','DIVINE','COSMIC'];
function barRow(label,pct,color){
  return '<div class="chrow"><div class="lbl">'+label+'</div><div class="track"><div class="fill" style="width:'+pct.toFixed(0)+'%;background:'+color+'"></div></div><div class="pct">'+pct.toFixed(0)+'%</div></div>';
}
// 合成/クラフトの出現率（DropInfoData をグループ展開・グループ内均等で算出した値を埋め込み）
const CHART_DATA={
  synthGearType:{title:'合成Gear：出やすい種類（DLC無し・アンコモン例）。主武器/防具が各11.7%、オフハンドは1.7%で出にくい。',
    rows:[['剣',11.7,'#d8a657'],['弓',11.7,'#d8a657'],['杖',11.7,'#d8a657'],['セプター',11.7,'#d8a657'],
      ['兜',11.7,'#5f93d0'],['鎧',11.7,'#5f93d0'],['手袋',11.7,'#5f93d0'],['靴',11.7,'#5f93d0'],
      ['盾',1.7,'#9a8f7a'],['矢',1.7,'#9a8f7a'],['オーブ',1.7,'#9a8f7a'],['魔導書',1.7,'#9a8f7a']]},
  craftMainWeaponGrade:{title:'クラフト主武器(tier1)：出るグレード。ほぼアンコモン/レア、レジェ以上は稀。',
    rows:[['アンコモン',50,'#5fb35f'],['レア',40,'#4f8fe0'],['レジェンダリー',8,'#c98b2e'],['イモータル',2,'#d05b5b']]},
  craftMainWeaponType:{title:'クラフト主武器(tier1)：出る武器種（DLC無し＝4種均等。Hunter DLCで+クロスボウ、Slayer DLCで+斧）。',
    rows:[['剣',25,'#d8a657'],['弓',25,'#d8a657'],['杖',25,'#d8a657'],['セプター',25,'#d8a657'],
      ['クロスボウ※Hunter',0,'#6f6253'],['斧※Slayer',0,'#6f6253']]},
  synthAccessoryType:{title:'首飾り・ブレーサーが多め、指輪は中くらい、イヤリングは出にくい。',
    rows:[['首飾り',34.5,'#a05fd0'],['ブレーサー',34.5,'#a05fd0'],['指輪',27.6,'#a05fd0'],['イヤリング',3.4,'#6a5a78']]},
  craftAccessoryType:{title:'イヤリング・ブレーサーが出やすく、首飾りは少なめ（合成と真逆）。',
    rows:[['イヤリング',30.3,'#a05fd0'],['ブレーサー',30.3,'#a05fd0'],['指輪',24.2,'#a05fd0'],['首飾り',15.2,'#6a5a78']]},
  synthMaterialType:{title:'合成Material：出やすい種類。装飾(宝石)とクラフト素材が各40%、彫刻20%。',
    rows:[['装飾(宝石)',40,'#3fb6c0'],['クラフト素材',40,'#c98b2e'],['彫刻',20,'#5fb35f']]},
  gradeUpgrade:{title:'合成で「1つ上のグレードへ昇格する確率」。レジェまで100%、イモータルから急落＝壁。',
    rows:[['コモン',100,'#9aa0a6'],['アンコモン',100,'#5fb35f'],['レア',100,'#4f8fe0'],['レジェンダリー',100,'#c98b2e'],
      ['イモータル',50,'#d05b5b'],['アルカナ',33,'#a05fd0'],['ビヨンド',23,'#d84f9a'],['セレスティアル',17,'#3fb6c0'],['ディバイン',9,'#e0c850']]},
  tormentWhiteBox:{title:'トーメント白箱(910801・通常敵)の中身 上位。装備は全て“次元”シリーズ(Lv80)。コモン兜/剣が圧倒的、レア以上は薄い。',
    rows:[['次元の兜 コモン',17.66,'#9aa0a6'],['次元の剣 コモン',14.72,'#9aa0a6'],
      ['次元の兜 アンコモン',6.90,'#5fb35f'],['次元の剣 アンコモン',5.75,'#5fb35f'],
      ['次元の兜 レア',5.36,'#4f8fe0'],['次元の剣 レア',4.47,'#4f8fe0'],
      ['次元のクロスボウ コモン',3.68,'#9aa0a6'],['次元の斧 コモン',3.68,'#9aa0a6'],
      ['ブロンズインゴット',3.07,'#5fb35f'],['黒曜石の破片',2.99,'#5fb35f'],
      ['銀のインゴット',2.95,'#4f8fe0'],['ルビー',2.87,'#4f8fe0']]},
  tormentBlueBox:{title:'トーメント青箱(920801・ステージボス)の中身 上位。最多はソウルストーン。装備はアンコモン/レア帯が中心。',
    rows:[['ソウルストーン-トーメント',16.16,'#3fb6c0'],['次元の兜 アンコモン',9.30,'#5fb35f'],
      ['次元の剣 アンコモン',7.75,'#5fb35f'],['次元の兜 レア',6.69,'#4f8fe0'],
      ['ソウルストーン-ヘル',6.46,'#d84f9a'],['次元の剣 レア',5.57,'#4f8fe0'],
      ['銀のインゴット',4.05,'#4f8fe0'],['ルビー',3.37,'#4f8fe0'],
      ['次元の兜 コモン',3.25,'#9aa0a6'],['スターダストインゴット',3.10,'#c98b2e'],
      ['次元の剣 コモン',2.71,'#9aa0a6'],['クリスタルクォーツ',2.57,'#c98b2e']]},
};
function drawBarList(el,cd){
  let h='<div class="ct">'+cd.title+'</div>';
  cd.rows.forEach(r=>{h+=barRow(r[0],r[1],r[2]);});
  el.innerHTML=h;
}
function drawCharts(){
  document.querySelectorAll('.chart').forEach(el=>{
    const cd=CHART_DATA[el.dataset.chart];
    if(cd) drawBarList(el,cd);
  });
}
// 自分用メモ（localStorageに保存・リロードしても残る）
(function(){
  const KEY='tbh-info-memo', ta=document.getElementById('memo'), st=document.getElementById('memoStatus');
  try{ta.value=localStorage.getItem(KEY)||'';}catch(e){}
  let t;
  ta.addEventListener('input',()=>{
    try{localStorage.setItem(KEY,ta.value);st.textContent='保存しました ✓';
      clearTimeout(t);t=setTimeout(()=>{st.textContent='この端末に自動保存';},1200);
    }catch(e){st.textContent='保存できません（プライベートモード?）';}
  });
})();
// 本文の表示＋ページ内編集（変更はlocalStorageに保存。元の.mdには影響しない）
(function(){
  const MDKEY='tbh-info-md-override';
  let fileMd='';            // 配信ファイルの内容
  const mdEl=document.getElementById('md');
  const editor=document.getElementById('editor');
  const area=document.getElementById('editArea');
  const editBtn=document.getElementById('editBtn');
  const saveBtn=document.getElementById('saveBtn');
  const cancelBtn=document.getElementById('cancelBtn');
  const resetBtn=document.getElementById('resetBtn');
  const st=document.getElementById('editStatus');
  function getOverride(){try{return localStorage.getItem(MDKEY);}catch(e){return null;}}
  function currentMd(){const o=getOverride();return o!==null?o:fileMd;}
  function setStatus(){const edited=getOverride()!==null;
    st.textContent=edited?'✏️ 編集済み（この端末）':'';st.className='es'+(edited?' edited':'');}
  function paint(md){
    const {html,toc}=render(md);
    mdEl.innerHTML=html;
    drawCharts();
    const t=document.getElementById('toc');
    if(toc.length){t.style.display='block';
      t.innerHTML=toc.map(x=>'<a href="#'+x.id+'">'+x.txt.replace(/[★]/g,'').slice(0,18)+'</a>').join('');}
    else t.style.display='none';
    setStatus();
  }
  function openEditor(){area.value=currentMd();editor.style.display='block';mdEl.style.display='none';editBtn.style.display='none';area.focus();}
  function closeEditor(){editor.style.display='none';mdEl.style.display='block';editBtn.style.display='inline-block';}
  editBtn.addEventListener('click',openEditor);
  cancelBtn.addEventListener('click',closeEditor);
  saveBtn.addEventListener('click',()=>{
    try{
      if(area.value===fileMd){localStorage.removeItem(MDKEY);}   // 元と同じなら保存解除
      else{localStorage.setItem(MDKEY,area.value);}
    }catch(e){alert('保存できませんでした（プライベートモード?）');return;}
    paint(area.value);closeEditor();
  });
  resetBtn.addEventListener('click',()=>{
    if(!confirm('この端末の編集を破棄して、元の内容に戻しますか？'))return;
    try{localStorage.removeItem(MDKEY);}catch(e){}
    area.value=fileMd;paint(fileMd);
  });
  fetch('TBH-解析メモ.md?v='+Date.now(),{cache:'no-store'}).then(r=>r.text()).then(md=>{
    fileMd=md;paint(currentMd());
  }).catch(e=>{
    // ファイル取得失敗でも編集済みがあれば表示
    const o=getOverride();
    if(o!==null)paint(o);
    else mdEl.innerHTML='<div class="loading">読み込み失敗: '+e+'</div>';
  });
})();
</script>
</body>
</html>
